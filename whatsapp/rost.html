<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roast Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#141e30,#243b55);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff4d6d;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* RESULT */
.result{
  margin-top:15px;
  font-size:18px;
}

/* BACK */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:#ff4d6d;
  padding:10px;
  border-radius:50%;
  text-decoration:none;
  color:white;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">←</a>

<div class="box">

  <h2>😂 Roast Generator</h2>

  <input id="name" placeholder="Enter name">

  <button onclick="roast()">Generate Roast 😈</button>

  <div class="result" id="result"></div>

  <button onclick="share()">Share 💚</button>

</div>

<script>

const roasts=[
"{name}, you are not lazy… just energy saving mode 😂",
"{name}, your brain loading… please wait 🤣",
"{name}, even Google can't find your logic 😆",
"{name}, you run fast… from responsibility 😂",
"{name}, you are limited edition… no one wants 🤣",
"{name}, your WiFi is stronger than your brain 😂",
"{name}, you are like software update… always later 😆",
"{name}, your jokes need loading… still not working 🤣"
];

function roast(){
let name=document.getElementById("name").value;
if(name=="") return alert("Enter name");

let r=roasts[Math.floor(Math.random()*roasts.length)];
r=r.replace("{name}",name);

document.getElementById("result").innerText=r;
}

function share(){
let text=document.getElementById("result").innerText;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
