<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personality Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#3a1c71,#d76d77,#ffaf7b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.option{
  background:#ffffff20;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.option:hover{
  background:white;
  color:black;
}

.result{
  font-size:20px;
  margin-top:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
  cursor:pointer;
}

/* BACK */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:white;
  padding:10px;
  border-radius:50%;
  text-decoration:none;
  color:black;
}

/* HIDE */
.hidden{display:none;}
</style>

</head>

<body>

<a href="index.html" class="back-btn">←</a>

<div class="box" id="quiz">
  <h2>🧠 Personality Test</h2>
  <p id="question"></p>
  <div id="options"></div>
</div>

<div class="box hidden" id="resultBox">
  <h2>Your Result 😎</h2>
  <div class="result" id="result"></div>
  <button onclick="location.reload()">Try Again 🔁</button>
</div>

<script>

let index=0;
let score=0;

const questions=[
{q:"You like spending time?",o:["Alone 😶","With friends 😎"]},
{q:"In party you are?",o:["Silent 😅","Center of attraction 🔥"]},
{q:"Free time?",o:["Netflix & chill 😴","Go out 😁"]},
{q:"Talking style?",o:["Less talk 😶","Non-stop 😂"]},
{q:"Energy level?",o:["Calm 😌","Hyper ⚡"]}
];

function loadQ(){
let q=questions[index];
document.getElementById("question").innerText=q.q;

let html="";
q.o.forEach((op,i)=>{
html+=`<div class="option" onclick="selectAns(${i})">${op}</div>`;
});

document.getElementById("options").innerHTML=html;
}

function selectAns(i){
if(i==1) score+=20; // extrovert side
index++;

if(index<questions.length){
loadQ();
}else{
showResult();
}
}

function showResult(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultBox").classList.remove("hidden");

let text="";

if(score>70){
text="😎 Extrovert - Social king 🔥";
}else if(score>40){
text="🤝 Ambivert - Balanced personality 😍";
}else{
text="😶 Introvert - Silent power 💪";
}

document.getElementById("result").innerText=text;
}

loadQ();

</script>

</body>
</html>
