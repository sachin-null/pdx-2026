<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Fast</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  text-align:center;
  font-family:Poppins;
}

h1{margin-top:40px;}

#btn{
  margin-top:50px;
  padding:40px 60px;
  font-size:22px;
  border:none;
  border-radius:20px;
  background:#00eaff;
  color:black;
}

#btn:active{
  transform:scale(0.95);
}

.info{
  margin-top:20px;
  font-size:18px;
}

.back{
  position:fixed;
  top:15px;
  left:15px;
  text-decoration:none;
  color:#00eaff;
}
</style>
</head>

<body>

<a class="back" href="index.html">⬅ Back</a>

<h1>⚡ Tap Fast</h1>

<div class="info">Time: <span id="time">5</span>s</div>
<div class="info">Score: <span id="score">0</span></div>

<button id="btn">TAP!</button>

<script>
let time = 5;
let score = 0;
let playing = false;

const btn = document.getElementById("btn");

btn.onclick = () => {
  if(!playing){
    playing = true;
    startGame();
  }
  score++;
  document.getElementById("score").innerText = score;
};

function startGame(){
  let timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      clearInterval(timer);
      btn.disabled = true;
      alert("Game Over 😎 Your Score: " + score);
    }
  },1000);
}
</script>

</body>
</html>
