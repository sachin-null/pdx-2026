<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Snake Game | Paradox World</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--green:#00ff88;--cyan:#00eaff;--red:#f43f5e;--purple:#a855f7;--bg:#04060a;--border:rgba(0,255,136,.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:none}
body{
  background:var(--bg);color:#fff;
  font-family:'Orbitron',monospace;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  user-select:none;-webkit-user-select:none;
}
/* BG */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,136,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,.022) 1px,transparent 1px);
  background-size:28px 28px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(0,255,136,.04),transparent 65%);
}

/* ── NAV ── */
nav{
  position:relative;z-index:10;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:52px;
  background:rgba(4,6,10,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.nav-logo{font-size:.72rem;font-weight:700;letter-spacing:.18em;color:var(--green);text-shadow:0 0 12px var(--green)}
.nav-back{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;
  color:rgba(255,255,255,.4);text-decoration:none;
  border:1px solid var(--border);padding:5px 12px;border-radius:100px;transition:all .2s;
}
.nav-back:hover{color:var(--green);border-color:rgba(0,255,136,.3)}

/* ── SCORE ROW ── */
.score-row{
  position:relative;z-index:10;
  display:flex;gap:8px;align-items:center;justify-content:center;
  padding:8px 16px 6px;width:100%;flex-shrink:0;
}
.sbox{
  background:rgba(0,255,136,.05);border:1px solid var(--border);
  border-radius:10px;padding:7px 16px;text-align:center;min-width:90px;
}
.sbox.best{border-color:rgba(0,234,255,.2);background:rgba(0,234,255,.05)}
.sbox.lvl{border-color:rgba(168,85,247,.2);background:rgba(168,85,247,.05)}
.s-lbl{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.15em;color:rgba(255,255,255,.3);margin-bottom:1px}
.s-num{font-size:1.1rem;font-weight:900;color:var(--green);text-shadow:0 0 8px var(--green);line-height:1}
.sbox.best .s-num{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
.sbox.lvl .s-num{color:var(--purple);text-shadow:0 0 8px var(--purple)}

/* ── CANVAS WRAP ── */
.canvas-wrap{
  position:relative;z-index:10;flex-shrink:0;
  border-radius:14px;overflow:hidden;
  border:2px solid var(--border);
  box-shadow:0 0 40px rgba(0,255,136,.07),0 0 80px rgba(0,0,0,.8);
  margin:6px 0;
}
canvas{display:block;background:#000}

/* ── OVERLAYS ── */
.overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(4,6,10,.88);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  border-radius:12px;
}
.overlay.hidden{display:none}
.ov-icon{font-size:2.8rem;animation:iconPop 1s ease infinite alternate}
@keyframes iconPop{from{transform:scale(1)}to{transform:scale(1.1)}}
.ov-title{font-size:clamp(.9rem,4vw,1.4rem);font-weight:900;letter-spacing:.08em;text-align:center}
.ov-sub{font-family:'Space Mono',monospace;font-size:.58rem;color:rgba(255,255,255,.35);letter-spacing:.15em;text-align:center}
.ov-score{font-size:1.6rem;font-weight:900;color:var(--green);text-shadow:0 0 12px var(--green)}
.ov-btn{
  font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.15em;padding:11px 28px;border-radius:100px;border:none;
  background:var(--green);color:#000;cursor:pointer;transition:all .2s;
  text-transform:uppercase;margin-top:4px;
}
.ov-btn:hover,.ov-btn:active{transform:scale(1.06);box-shadow:0 0 24px rgba(0,255,136,.5)}
.ov-btn.red{background:var(--red);color:#fff}
.ov-best-tag{
  font-family:'Space Mono',monospace;font-size:.58rem;
  color:var(--cyan);letter-spacing:.12em;
  background:rgba(0,234,255,.08);border:1px solid rgba(0,234,255,.2);
  padding:4px 12px;border-radius:100px;
}

/* ── D-PAD ── */
.dpad{
  position:relative;z-index:10;
  display:grid;grid-template-columns:repeat(3,52px);
  grid-template-rows:repeat(3,52px);
  gap:5px;margin:6px 0;flex-shrink:0;
}
.d{
  width:52px;height:52px;border-radius:12px;
  background:rgba(0,255,136,.07);border:1px solid var(--border);
  color:var(--green);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;
  -webkit-tap-highlight-color:transparent;
}
.d:active{background:rgba(0,255,136,.22);transform:scale(.91);box-shadow:0 0 16px rgba(0,255,136,.35)}
.d-up   {grid-column:2;grid-row:1}
.d-left {grid-column:1;grid-row:2}
.d-mid  {grid-column:2;grid-row:2;font-size:.45rem;font-family:'Space Mono',monospace;color:rgba(0,255,136,.25);letter-spacing:.05em;cursor:default;background:rgba(0,255,136,.03)}
.d-right{grid-column:3;grid-row:2}
.d-down {grid-column:2;grid-row:3}

/* ── TOAST ── */
.toast{
  position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-8px);
  z-index:999;background:#0a0f0a;border:1px solid var(--green);
  border-radius:100px;padding:8px 18px;
  font-family:'Space Mono',monospace;font-size:.62rem;
  letter-spacing:.1em;color:var(--green);
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEVEL UP FLASH */
.level-flash{
  position:fixed;inset:0;z-index:500;pointer-events:none;
  background:rgba(168,85,247,.12);
  opacity:0;transition:opacity .15s;
}
.level-flash.on{opacity:1}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">🐍 SNAKE</div>
  <a href="index.html" class="nav-back">← BACK</a>
</nav>

<!-- SCORE ROW -->
<div class="score-row">
  <div class="sbox"><div class="s-lbl">SCORE</div><div class="s-num" id="scoreNum">0</div></div>
  <div class="sbox lvl"><div class="s-lbl">LEVEL</div><div class="s-num" id="levelNum">1</div></div>
  <div class="sbox best"><div class="s-lbl">BEST</div><div class="s-num" id="bestNum">0</div></div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="gc"></canvas>

  <!-- START -->
  <div class="overlay" id="ovStart">
    <div class="ov-icon">🐍</div>
    <div class="ov-title">SNAKE GAME</div>
    <div class="ov-sub">// Made By sachin</div>
    <button class="ov-btn" id="startBtn">▶ START</button>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="ovOver">
    <div class="ov-icon">💀</div>
    <div class="ov-title" style="color:var(--red)">GAME OVER</div>
    <div class="ov-sub">FINAL SCORE</div>
    <div class="ov-score" id="finalScore">0</div>
    <div class="ov-best-tag hidden" id="newBestTag">🏆 NEW BEST!</div>
    <button class="ov-btn red" id="retryBtn">↺ RETRY</button>
  </div>

  <!-- PAUSE -->
  <div class="overlay hidden" id="ovPause">
    <div class="ov-icon">⏸</div>
    <div class="ov-title">PAUSED</div>
    <button class="ov-btn" id="resumeBtn">▶ RESUME</button>
  </div>
</div>

<!-- D-PAD -->
<div class="dpad">
  <div class="d d-up"    id="dUp">▲</div>
  <div class="d d-left"  id="dLeft">◀</div>
  <div class="d d-mid">D·PAD</div>
  <div class="d d-right" id="dRight">▶</div>
  <div class="d d-down"  id="dDown">▼</div>
</div>

<div class="toast" id="toast"></div>
<div class="level-flash" id="lvlFlash"></div>

<script>
// ── CANVAS SIZE ──
const wrap = document.getElementById('canvasWrap');
const gc   = document.getElementById('gc');
const ctx  = gc.getContext('2d');
const BOX  = 18;
let COLS, ROWS, W, H;

function sizeCanvas(){
  const maxW = Math.min(window.innerWidth - 16, 380);
  COLS = Math.floor(maxW / BOX);
  if(COLS % 2 === 0) COLS--;          // keep odd for center start
  ROWS = COLS;
  W = gc.width  = COLS * BOX;
  H = gc.height = ROWS * BOX;
}
sizeCanvas();

// ── STATE ──
let snake, dir, nextDir, food, particles;
let score, best, level, speed, frameId;
let running = false, paused = false;
let foodAnim = 0;

best = +localStorage.getItem('snakeBest') || 0;
document.getElementById('bestNum').textContent = best;

// ── INIT ──
function init(){
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = nextDir = 'RIGHT';
  score = 0; level = 1; speed = 160;
  particles = [];
  placeFood();
  updUI();
}

function placeFood(){
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===p.x&&s.y===p.y));
  food = p;
}

// ── RENDER ──
function render(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,255,136,.03)';
  ctx.lineWidth = 1;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.strokeRect(c*BOX,r*BOX,BOX,BOX);
  }

  // particles
  particles = particles.filter(p=>{
    p.life -= 2.5; p.x += p.vx; p.y += p.vy; p.vy -= .18;
    if(p.life <= 0) return false;
    ctx.globalAlpha = p.life / 100;
    ctx.fillStyle   = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life/100), 0, Math.PI*2);
    ctx.fill();
    return true;
  });
  ctx.globalAlpha = 1;

  // food — pulsing glow
  foodAnim = (foodAnim + 4) % 360;
  const pulse = .85 + .15 * Math.sin(foodAnim * Math.PI / 180);
  const fx = food.x * BOX + BOX/2, fy = food.y * BOX + BOX/2;
  const fg = ctx.createRadialGradient(fx,fy,0,fx,fy,BOX*1.3*pulse);
  fg.addColorStop(0,'rgba(244,63,94,.55)'); fg.addColorStop(1,'transparent');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.arc(fx,fy,BOX*1.3*pulse,0,Math.PI*2); ctx.fill();
  // food body
  ctx.fillStyle = '#f43f5e';
  const fs = (BOX-3) * pulse;
  roundRect(ctx, food.x*BOX+(BOX-fs)/2, food.y*BOX+(BOX-fs)/2, fs, fs, 4);
  ctx.fill();
  // shine
  ctx.fillStyle = 'rgba(255,255,255,.65)';
  ctx.beginPath(); ctx.arc(food.x*BOX+5, food.y*BOX+5, 2, 0, Math.PI*2); ctx.fill();

  // snake
  snake.forEach((seg, i) => {
    const x = seg.x*BOX, y = seg.y*BOX;
    const t = i / Math.max(snake.length-1, 1);
    const isHead = i === 0;

    if(isHead){
      // head glow
      const hg = ctx.createRadialGradient(x+BOX/2,y+BOX/2,0,x+BOX/2,y+BOX/2,BOX*1.1);
      hg.addColorStop(0,'rgba(0,255,136,.35)'); hg.addColorStop(1,'transparent');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(x+BOX/2,y+BOX/2,BOX*1.1,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#00ff88';
    } else {
      // gradient body: green → teal → dark
      const g = Math.round(255*(1-t*.55));
      const b = Math.round(t*90);
      ctx.fillStyle = `rgb(0,${g},${b})`;
    }

    roundRect(ctx, x+1, y+1, BOX-2, BOX-2, isHead?5:3);
    ctx.fill();

    // eyes on head
    if(isHead){
      let ex1,ey1,ex2,ey2;
      const m=3, n=BOX-5;
      if(dir==='RIGHT'||dir==='LEFT'){
        ex1=ex2=x+(dir==='RIGHT'?BOX-4:3); ey1=y+m; ey2=y+n;
      } else {
        ey1=ey2=y+(dir==='DOWN'?BOX-4:3); ex1=x+m; ex2=x+n;
      }
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(ex1,ey1,2.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2,ey2,2.2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.beginPath(); ctx.arc(ex1-.5,ey1-.5,1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2-.5,ey2-.5,1,0,Math.PI*2); ctx.fill();
    }
  });
}

function roundRect(c,x,y,w,h,r){
  c.beginPath(); c.roundRect(x,y,w,h,r);
}

// ── UPDATE ──
function update(){
  dir = nextDir;
  const head = snake[0];
  let nx = head.x, ny = head.y;
  if(dir==='RIGHT') nx++;
  if(dir==='LEFT')  nx--;
  if(dir==='UP')    ny--;
  if(dir==='DOWN')  ny++;

  // wall
  if(nx<0||ny<0||nx>=COLS||ny>=ROWS){ gameOver(); return; }
  // self
  if(snake.some(s=>s.x===nx&&s.y===ny)){ gameOver(); return; }

  const newHead = {x:nx, y:ny};

  if(nx===food.x && ny===food.y){
    score++;
    burst(food.x*BOX+BOX/2, food.y*BOX+BOX/2, '#f43f5e');

    if(score % 5 === 0){
      level++;
      speed = Math.max(55, speed - 12);
      toast(`⚡ LEVEL ${level}!`);
      flashLevel();
      burst(nx*BOX+BOX/2, ny*BOX+BOX/2, '#a855f7');
      stopLoop(); startLoop();
    }
    placeFood(); updUI();
    snake.unshift(newHead);
  } else {
    snake.pop();
    snake.unshift(newHead);
  }
}

// ── PARTICLES ──
function burst(x,y,col){
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2, v=Math.random()*3.5+.8;
    particles.push({x,y,col,life:80+Math.random()*40,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.2,r:Math.random()*3+1});
  }
}

// ── LOOP ──
let lastTime=0, accumulator=0;
function loop(ts){
  if(!running||paused){ frameId=null; return; }
  const dt = ts - lastTime; lastTime = ts;
  accumulator += dt;
  if(accumulator >= speed){ accumulator -= speed; update(); }
  render();
  frameId = requestAnimationFrame(loop);
}

function startLoop(){ lastTime=performance.now(); accumulator=0; frameId=requestAnimationFrame(loop); }
function stopLoop() { if(frameId){ cancelAnimationFrame(frameId); frameId=null; } }

// ── GAME CONTROLS ──
function startGame(){
  hide('ovStart'); init(); running=true; paused=false; startLoop();
}
function retryGame(){
  hide('ovOver'); init(); running=true; paused=false; startLoop();
}
function pauseGame(){
  if(!running) return;
  paused=!paused;
  if(paused){ show('ovPause'); stopLoop(); }
}
function resumeGame(){
  paused=false; hide('ovPause');
  lastTime=performance.now(); accumulator=0;
  frameId=requestAnimationFrame(loop);
}
function gameOver(){
  stopLoop(); running=false;
  let newBest=false;
  if(score>best){ best=score; localStorage.setItem('snakeBest',best); newBest=true; }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestNum').textContent    = best;
  if(newBest){ document.getElementById('newBestTag').classList.remove('hidden'); toast('🏆 NEW BEST SCORE!'); }
  else        { document.getElementById('newBestTag').classList.add('hidden'); }
  show('ovOver');
}

// ── DIR ──
function setDir(d){
  if(!running||paused) return;
  const opp={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
  if(d !== opp[dir]) nextDir = d;
}

// ── UI HELPERS ──
function updUI(){
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('levelNum').textContent = level;
}
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function flashLevel(){
  const f=document.getElementById('lvlFlash');
  f.classList.add('on'); setTimeout(()=>f.classList.remove('on'),150);
}

// ── EVENTS ──
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', retryGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);

// D-PAD — both touch and mouse
function dBtn(id, d){
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e=>{ e.preventDefault(); setDir(d); }, {passive:false});
  el.addEventListener('mousedown',  ()=> setDir(d));
}
dBtn('dUp','UP'); dBtn('dDown','DOWN'); dBtn('dLeft','LEFT'); dBtn('dRight','RIGHT');

// Keyboard
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowUp')    { e.preventDefault(); setDir('UP'); }
  if(e.key==='ArrowDown')  { e.preventDefault(); setDir('DOWN'); }
  if(e.key==='ArrowLeft')  { e.preventDefault(); setDir('LEFT'); }
  if(e.key==='ArrowRight') { e.preventDefault(); setDir('RIGHT'); }
  if(e.key===' ')          { e.preventDefault(); pauseGame(); }
  if(e.key==='Enter' && !running) startGame();
});

// Swipe
let tx=0,ty=0;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchend',   e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;     // tap — ignore
  if(Math.abs(dx)>Math.abs(dy)){
    setDir(dx>0?'RIGHT':'LEFT');
  } else {
    setDir(dy>0?'DOWN':'UP');
  }
},{passive:true});

// Resize
window.addEventListener('resize',()=>{ sizeCanvas(); if(!running) render(); });

// Initial render
init(); render();
</script>
</body>
</html>
