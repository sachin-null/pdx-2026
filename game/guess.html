<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess Number</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  text-align:center;
  font-family:Poppins;
}

h1{margin-top:40px;}

input{
  padding:10px;
  font-size:18px;
  margin-top:20px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00eaff;
  color:black;
}

.msg{
  margin-top:20px;
  font-size:18px;
}

.back{
  position:fixed;
  top:15px;
  left:15px;
  text-decoration:none;
  color:#00eaff;
}
</style>
</head>

<body>

<a class="back" href="index.html">⬅ Back</a>

<h1>🔢 Guess The Number</h1>

<p>Guess between 1 - 100</p>

<input type="number" id="input">
<br>
<button onclick="check()">Guess</button>

<div class="msg" id="msg"></div>

<script>
let num = Math.floor(Math.random()*100)+1;

function check(){
  let guess = document.getElementById("input").value;

  if(guess == num){
    document.getElementById("msg").innerText = "🎉 Correct!";
  }
  else if(guess > num){
    document.getElementById("msg").innerText = "📉 Too High!";
  }
  else{
    document.getElementById("msg").innerText = "📈 Too Low!";
  }
}
</script>

</body>
</html>
