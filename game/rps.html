<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#1f4037,#99f2c8);
  color:white;
  text-align:center;
}

/* BACK BUTTON */
.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  background:white;
  color:black;
  padding:10px;
  border-radius:50%;
  text-decoration:none;
  font-size:18px;
}

/* MAIN */
.container{
  margin-top:80px;
}

h2{
  font-size:28px;
}

/* OPTIONS */
.choices{
  margin-top:30px;
}

.choice{
  display:inline-block;
  padding:20px;
  margin:10px;
  font-size:30px;
  background:rgba(255,255,255,0.2);
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.choice:hover{
  transform:scale(1.2);
  background:white;
  color:black;
}

/* RESULT */
.result{
  margin-top:20px;
  font-size:20px;
}

/* SCORE */
.score{
  margin-top:10px;
  font-size:18px;
}

/* ANIMATION */
.animate{
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.8);}
  to{transform:scale(1);}
}
</style>

</head>

<body>

<a href="index.html" class="back-btn">⬅️</a>

<div class="container">

<h2>✊ Rock Paper Scissors</h2>

<div class="choices">
  <div class="choice" onclick="play('rock')">✊</div>
  <div class="choice" onclick="play('paper')">✋</div>
  <div class="choice" onclick="play('scissors')">✌️</div>
</div>

<div class="result" id="result">Choose one 😎</div>
<div class="score">
  You: <span id="you">0</span> |
  Bot: <span id="bot">0</span>
</div>

</div>

<script>

let userScore=0;
let botScore=0;

function play(user){

const options=["rock","paper","scissors"];
let bot=options[Math.floor(Math.random()*3)];

let res="";

if(user==bot){
res="😐 Draw!";
}
else if(
(user=="rock" && bot=="scissors") ||
(user=="paper" && bot=="rock") ||
(user=="scissors" && bot=="paper")
){
res="🥳 You Win!";
userScore++;
}else{
res="😂 You Lose!";
botScore++;
}

document.getElementById("you").innerText=userScore;
document.getElementById("bot").innerText=botScore;

let text=`You: ${user} | Bot: ${bot} <br>${res}`;

let resultBox=document.getElementById("result");
resultBox.innerHTML=text;

resultBox.classList.add("animate");

setTimeout(()=>{
resultBox.classList.remove("animate");
},300);

}

</script>

</body>
</html>
