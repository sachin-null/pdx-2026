<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⏳ Time-Based Mystery | Paradox World</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--c:#fbbf24;--bg:#04030a;--border:rgba(251,191,36,.15);--w:rgba(255,255,255,.85);--muted:rgba(255,255,255,.38)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--c);border-radius:2px}
body{background:var(--bg);font-family:'Crimson Pro',serif;min-height:100vh;overflow-x:hidden;color:var(--w)}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(251,191,36,.12) 0%,transparent 65%),
  radial-gradient(ellipse 50% 55% at 80% 80%,rgba(251,191,36,.08) 0%,transparent 65%)}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px)}
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;background:rgba(4,3,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;color:var(--c);letter-spacing:.2em;text-shadow:0 0 14px var(--c)}
.nav-links{display:flex;gap:6px}
.nav-link{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:5px 11px;border-radius:4px;letter-spacing:.08em;transition:all .2s}
.nav-link:hover{color:var(--c);border-color:var(--c)}
.hero{position:relative;z-index:10;text-align:center;padding:70px 20px 40px;animation:fadeDown .8s ease both}
.genre-badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.28em;color:var(--c);border:1px solid rgba(251,191,36,.25);padding:5px 16px;border-radius:20px;margin-bottom:18px;background:rgba(251,191,36,.05);opacity:.8;text-shadow:0 0 8px var(--c)}
.story-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,6vw,4rem);font-weight:900;letter-spacing:.06em;line-height:.95;margin-bottom:14px;background:linear-gradient(135deg,#fff 0%,var(--c) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(251,191,36,.3))}
.story-desc{font-family:'Crimson Pro',serif;font-style:italic;font-size:clamp(1rem,2vw,1.2rem);color:rgba(255,255,255,.5);letter-spacing:.04em;max-width:540px;margin:0 auto 40px;line-height:1.7}
.divider{display:flex;align-items:center;gap:14px;max-width:500px;margin:0 auto;padding:0 20px 40px;position:relative;z-index:10}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(251,191,36,.2),transparent)}
.divider-gem{font-size:.75rem;color:var(--c);text-shadow:0 0 10px var(--c);animation:pulse 3s ease infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
.parts-wrap{position:relative;z-index:10;max-width:700px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.part-card{background:rgba(255,255,255,.03);border:1px solid rgba(251,191,36,.15);border-radius:12px;padding:22px 18px;text-decoration:none;color:inherit;transition:all .3s;display:flex;flex-direction:column;gap:6px}
.part-card:hover{background:rgba(251,191,36,.08);border-color:var(--c);transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.4),0 0 20px rgba(251,191,36,.15)}
.part-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:rgba(251,191,36,.5);letter-spacing:.18em}
.part-title{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;color:rgba(255,255,255,.8);line-height:1.3}
.part-cta{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--c);letter-spacing:.15em;margin-top:8px;opacity:.7}
.part-card:hover .part-cta{opacity:1}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:768px){nav{padding:0 48px}}
</style>
</head>
<body>
<nav>
    <div class="nav-logo">PARADOX WORLD</div>
  <div class="nav-links">
    <a href="../../index.html" class="nav-link">← STORY</a>
    <a href="/" class="nav-link">🏠 HOME</a>
  </div>
</nav>
<div class="hero">
  <div class="genre-badge">🔮 MYSTERY STORY</div>
  <h1 class="story-title">⏳ Time-Based Mystery</h1>
  <p class="story-desc">A story from Paradox World...</p>
</div>
<div class="divider"><div class="divider-line"></div><div class="divider-gem">✦</div><div class="divider-line"></div></div>
<div class="parts-wrap">

        <a href="part1.html" class="part-card">
          <div class="part-num">Part 1</div>
          <div class="part-title">Story</div>
          <div class="part-cta">Read →</div>
        </a>
        <a href="part2.html" class="part-card">
          <div class="part-num">Part 2</div>
          <div class="part-title">Story</div>
          <div class="part-cta">Read →</div>
        </a>
        <a href="part3.html" class="part-card">
          <div class="part-num">Part 3</div>
          <div class="part-title">Story</div>
          <div class="part-cta">Read →</div>
        </a>
        <a href="part4.html" class="part-card">
          <div class="part-num">Part 4</div>
          <div class="part-title">Story</div>
          <div class="part-cta">Read →</div>
        </a>
</div>
<script>
document.querySelectorAll('.part-card').forEach((c,i)=>{
  c.style.opacity='0';c.style.transform='translateY(20px)';
  c.style.transition=`opacity .45s ease ${i*.07}s, transform .45s ease ${i*.07}s, all .3s`;
  setTimeout(()=>{c.style.opacity='1';c.style.transform='translateY(0)'}, i*70+100);
});
</script>
</body>
</html>
